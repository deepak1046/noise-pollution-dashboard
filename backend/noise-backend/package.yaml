name: noise-backend
version: 0.1.0.0

dependencies:
- base >= 4.7 && < 5

library:
  source-dirs: src
  dependencies:
  - base >= 4.7 && < 5
  - http-types
  - cassava
  - vector
  - aeson
  - scotty
  - text
  - containers
  - time
  - statistics
  - bytestring
  - wai
  - wai-cors

executables:
  noise-backend-exe:
    main: Main.hs
    source-dirs: app
    dependencies:
    - noise-backend
    - base >= 4.7 && < 5
    - wai
    - wai-cors
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N